    <style>
      /* Static LCP shell — paints with first byte so Lighthouse can detect LCP
         before React hydrates. React replaces #root content on mount. */
      html, body { margin: 0; background: hsl(220 50% 4%); color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased; }
      .lcp-shell { min-height: 100dvh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; padding: 2rem 1.25rem;
        text-align: center; }
      .lcp-title { font-size: 28px; line-height: 1.15; font-weight: 700;
        letter-spacing: -0.01em; max-width: 28rem; margin: 0 0 0.75rem; }
      .lcp-accent { background: linear-gradient(90deg,#7cc4ff,#94d8ff);
        -webkit-background-clip: text; background-clip: text; color: transparent; }
      .lcp-sub { font-size: 14px; line-height: 1.55; color: rgba(255,255,255,0.7);
        max-width: 24rem; margin: 0; }
      @media (min-width: 640px) { .lcp-title { font-size: 34px; } }
    </style>
  </head>

  <body>
    <div id="root">
      <main class="lcp-shell">
        <h1 class="lcp-title">
          Quel est votre projet <span class="lcp-accent">aujourd'hui&nbsp;?</span>
        </h1>
        <p class="lcp-sub">Touchez l'orb d'Alex pour démarrer. Voix, photo, soumission ou texte — vous choisissez.</p>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
